<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome!</h1>
        <p>This is a beautiful HTML template to get you started.</p>
        <button onclick="alert('Hello! Click the button to get started.')">Get Started</button>
        
        <div style="margin-top: 40px; padding-top: 30px; border-top: 1px solid #eee;">
            <h3 style="color: #333; margin-bottom: 15px; font-size: 18px;">Contact Us</h3>
            <p style="margin-bottom: 10px;">
                <strong>Email:</strong> <a href="mailto:info@thebeautysciencebd.com" style="color: #667eea; text-decoration: none;">info@thebeautysciencebd.com</a>
            </p>
            <p style="color: #666; line-height: 1.6;">
                <strong>Phone:</strong> <a href="tel:+8801737242267" style="color: #667eea; text-decoration: none;">+880 173 724 2267</a>
            </p>
        </div>
    </div>
</body>
</html>
